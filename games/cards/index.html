<!doctype html>
<html lang="ko" data-page="cards">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2b2112" />
    <meta
      name="description"
      content="Card Camp is a compact mobile card survival prototype about stacking, crafting, and keeping the camp alive."
    />
    <meta property="og:title" content="Card Camp" />
    <meta
      property="og:description"
      content="Stack, craft, cook, and survive the day timer in a compact card camp prototype."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="../../assets/card-camp/og-card-camp.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Card Camp</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="back-link" href="../../" aria-label="Back to arcade">ARCADE</a>
    <main class="cards-shell">
      <section class="cards-board" aria-labelledby="cards-title">
        <p class="arcade-kicker">Playable Prototype</p>
        <h1 id="cards-title">Card Camp</h1>
        <p id="camp-message" class="cards-copy">
          Drag Villager onto Berry Bush to produce food.
        </p>
        <div class="camp-readout" aria-label="Camp status">
          <span id="camp-day">Day 1</span>
          <span id="camp-food">Food 0</span>
          <span id="camp-timer">Dusk 24s</span>
          <span id="camp-goal">Goal Light campfire</span>
        </div>
        <div id="card-table" class="card-table" aria-label="Card camp table">
          <div id="work-layer" class="work-layer"></div>
          <div id="card-layer" class="card-layer"></div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/cards.ts"></script>
  </body>
</html>
