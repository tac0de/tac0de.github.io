<!doctype html>
<html lang="ko" data-page="rpg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#120b13" />
    <meta
      name="description"
      content="Riftblade Arena is a static Three.js action RPG combat slice with click movement, skills, and enemy waves."
    />
    <meta property="og:title" content="Riftblade Arena" />
    <meta
      property="og:description"
      content="A compact dark-fantasy action RPG prototype built for static web deployment."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="../../og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Riftblade Arena</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="back-link" href="../../" aria-label="Back to arcade">ARCADE</a>
    <main class="rpg-shell">
      <canvas id="rpg-game" aria-label="Riftblade Arena game canvas"></canvas>
      <section class="rpg-hud" aria-label="Combat status">
        <div class="rpg-title">
          <p class="arcade-kicker">Playable Combat Slice</p>
          <h1>Riftblade Arena</h1>
          <p id="rpg-status">Click or tap the arena to move. Cut down the rift host.</p>
        </div>
        <div class="rpg-bars">
          <span id="rpg-hp">HP 100</span>
          <span id="rpg-shards">Shards 0</span>
          <span id="rpg-wave">Wave 1</span>
        </div>
      </section>
      <div class="rpg-skills" aria-label="Skills">
        <button id="skill-slash" type="button">Q Slash</button>
        <button id="skill-nova" type="button">E Nova</button>
      </div>
    </main>
    <script type="module" src="/src/rpg.ts"></script>
  </body>
</html>
