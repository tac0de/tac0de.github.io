<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Northbank Atlas CSS-only city planning preview">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0v36" fill="none" stroke="#1b2522" stroke-opacity=".075" stroke-width="1"/>
      <circle cx="18" cy="18" r="1.1" fill="#1b2522" fill-opacity=".055"/>
    </pattern>
    <pattern id="redline" width="108" height="108" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 18H36" stroke="#c4312b" stroke-opacity=".36" stroke-width="2"/>
    </pattern>
    <filter id="sheetShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#1b2522" flood-opacity=".18"/>
    </filter>
    <filter id="signalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f0eadf"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#redline)" opacity=".42"/>
  <path d="M602 0v630" stroke="#c4312b" stroke-opacity=".3" stroke-width="2"/>
  <rect x="34" y="34" width="1132" height="562" fill="none" stroke="#1b2522" stroke-opacity=".22" stroke-width="2"/>
  <path d="M34 64h1132M64 34v562" stroke="#1b2522" stroke-opacity=".16"/>

  <g transform="translate(84 68)">
    <text x="0" y="0" fill="#1b2522" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="3">CSS-ONLY CITY ATLAS</text>
    <text x="0" y="94" fill="#1b2522" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900">NORTHBANK</text>
    <text x="0" y="178" fill="#1b2522" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900">DISTRICT</text>
    <text x="0" y="222" fill="#1b2522" fill-opacity=".66" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" letter-spacing="3">HARBOR FRAMEWORK PLAN / 2040</text>

    <g transform="translate(0 382)">
      <rect width="632" height="88" fill="#fbf6ea" fill-opacity=".76" stroke="#1b2522" stroke-opacity=".18"/>
      <path d="M210 0v88M420 0v88" stroke="#1b2522" stroke-opacity=".16"/>
