      <text x="28" y="39" fill="#1b2522" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900">22 HA</text>
      <text x="28" y="64" fill="#1b2522" fill-opacity=".62" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="1.4">FRAMEWORK AREA</text>
