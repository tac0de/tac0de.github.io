<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#151812" />
    <meta
      name="description"
      content="Outpost Miniature is a static browser colony simulation about tiny survivors, work priorities, resources, and daily incidents."
    />
    <meta property="og:title" content="Outpost Miniature" />
    <meta
      property="og:description"
      content="Run a tiny static-web colony sim with three survivors, a tile map, resources, work priorities, and an emerging settlement log."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Outpost Miniature</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-shell" aria-label="Settlement map">
        <canvas id="map"></canvas>
      </section>
      <aside class="side-panel" aria-label="Colony controls">
        <header class="topbar">
          <div>
            <p>Outpost</p>
            <h1>Miniature</h1>
          </div>
          <div class="clock">
            <span id="day-label">Day 1</span>
            <span id="time-label">07:00</span>
            <span id="speed-label">1x</span>
          </div>
        </header>

        <section class="toolbar" aria-label="Simulation controls">
          <button id="pause" type="button">Pause</button>
          <button id="speed" type="button">Speed</button>
          <button id="save" type="button">Save</button>
          <button id="reset" type="button">Reset</button>
        </section>

        <section>
          <h2>Resources</h2>
          <div id="resources" class="resource-grid"></div>
        </section>

        <section>
          <h2>Colonists</h2>
          <div id="colonists" class="colonist-list"></div>
        </section>

        <section>
          <h2>Priority</h2>
          <div id="task-panel" class="task-grid"></div>
        </section>

        <section class="log-section">
          <h2>Settlement Log</h2>
          <div id="log-panel" class="log-list"></div>
        </section>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
